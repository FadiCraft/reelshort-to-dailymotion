name: Movie Scraper Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch: # يتيح لك زر التشغيل اليدوي من موقع جيت هاب

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps

    - name: Run Scraper Script
      run: node scraper.js

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # التحقق مما إذا كان هناك تغيير في ملف result.json لمنع الخطأ إذا لم يتغير شيء
        if [ -n "$(git status --porcelain result.json)" ]; then
          git add result.json
          git commit -m "تحديث تلقائي: جلب بيانات الفيلم وروابط الـ Embed"
          git push
        else
          echo "لا توجد تغييرات جديدة لحفظها."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
