name: Movie Scraper Workflow

on:
  push:
    branches:
      - main
  schedule:
    # للتشغيل التلقائي (مثلاً كل يوم الساعة 12 ظهراً بتوقيت جرينتش) يمكنك تفعيل هذا السطر:
    # - cron: '0 12 * * *'
  workflow_dispatch: # يتيح لك تشغيل المشروع يدوياً من موقع جيت هاب نفسه

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps

    - name: Run Scraper Script
      run: node scraper.js

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add result.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "تحديث تلقائي: جلب بيانات الفيلم وروابط الـ Embed" && git push)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
